<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-layout">
      <aside class="auth-hero">
        <p class="auth-kicker">Secure Access</p>
        <h1>Welcome Back</h1>
        <p>Sign in to continue to your dashboard and manage your live operations.</p>
      </aside>

      <section class="auth-panel">
        <h2>Login</h2>
        <p class="auth-subtitle">Use your registered email and password.</p>
        <form id="loginForm" class="auth-form">
          <label>Email</label>
          <input name="email" type="email" required />
          <label>Password</label>
          <input name="password" type="password" required />
          <button type="submit">Login</button>
        </form>
        <p class="auth-links"><a href="register.html">Create account</a> <span>|</span> <a href="index.html">Back Home</a></p>
      </section>
    </section>
  </main>
  <script src="script.js"></script>
  <script src="login.js"></script>
</body>
</html>

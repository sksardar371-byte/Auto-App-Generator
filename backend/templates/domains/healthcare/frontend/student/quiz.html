<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Survey</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body data-page="quiz">
  <main class="role-shell">
    <aside class="role-sidebar">
      <div class="role-brand"><h2>HMS Patient</h2><p>Patient workspace</p></div>
      <nav class="role-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="doctors.html">Doctors</a>
        <a href="doctors.html">Book Appointment</a>
        <a href="my-courses.html">My Appointments</a>
        <a href="course-player.html">Consultation Room</a>
        <a href="certificates.html">Medical Records</a>
        <a class="active" href="quiz.html">Health Survey</a>
      </nav>
      <a class="btn secondary" href="doctors.html">Find Doctors</a>
    </aside>
    <section class="role-main">
      <header class="role-topbar">
        <div><p>Patient Portal</p><h1>Health Survey</h1></div>
        <div class="topbar-actions"><span id="roleUserLabel" class="topbar-user"></span><a class="btn secondary" href="profile.html">Profile</a><button id="logoutBtn" class="btn secondary">Logout</button></div>
      </header>
      <section class="panel">
        <h2>Pre-Consultation Checklist</h2>
        <p class="muted">Choose the best safety step before your appointment.</p>
        <label><input type="radio" name="quizOption" value="0" /> Update your symptoms and recent medication history</label><br />
        <label><input type="radio" name="quizOption" value="1" /> Skip your medical history</label><br />
        <label><input type="radio" name="quizOption" value="2" /> Ignore the recommended checklist</label><br />
        <button id="submitQuizBtn" class="btn" type="button" style="margin-top:12px;">Submit Checklist</button>
        <p id="quizResult" class="muted" style="margin-top:8px;"></p>
      </section>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script src="../script.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/student.js"></script>
  <script src="../js/quiz.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | FoodRush</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-nav">
    <div class="container nav-inner">
      <div class="logo">FoodRush</div>
    </div>
  </header>

  <main class="container" style="padding:18px 0;">
    <section class="kpis">
      <article class="kpi"><span>My Orders</span><strong id="kpiOrderCount">0</strong></article>
      <article class="kpi"><span>Delivered</span><strong id="kpiDelivered">0</strong></article>
      <article class="kpi"><span>Saved Addresses</span><strong>3</strong></article>
      <article class="kpi"><span>Favorites</span><strong>12</strong></article>
    </section>

    <section class="section">
      <div class="panel">
        <img src="https://loremflickr.com/1400/700/customer,food-delivery?lock=701" alt="Customer order history and delivered meals" loading="lazy" style="border-radius:12px; border:1px solid #f0f0f0; margin-bottom:12px;" />
        <h2>Recent Orders</h2>
        <div id="ordersList"></div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>

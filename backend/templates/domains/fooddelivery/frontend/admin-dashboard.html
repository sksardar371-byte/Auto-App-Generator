<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | FoodRush</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-nav">
    <div class="container nav-inner">
      <div class="logo">FoodRush Admin</div>
    </div>
  </header>

  <main class="container" style="padding:18px 0;">
    <section class="kpis">
      <article class="kpi"><span>Total Restaurants</span><strong>320</strong></article>
      <article class="kpi"><span>Total Users</span><strong>12940</strong></article>
      <article class="kpi"><span>Live Orders</span><strong>486</strong></article>
      <article class="kpi"><span>Daily GMV</span><strong>Rs 9.1L</strong></article>
    </section>

    <section class="section">
      <div class="panel">
        <img src="https://loremflickr.com/1400/700/food-delivery,analytics?lock=801" alt="Admin analytics for food delivery orders and payments" loading="lazy" style="border-radius:12px; border:1px solid #f0f0f0;" />
      </div>
    </section>

    <section class="section">
      <div class="panel">
        <h3>Admin Modules</h3>
        <p class="meta">Restaurants | Users | Orders | Payments | Delivery Partners | Analytics | Reports</p>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>

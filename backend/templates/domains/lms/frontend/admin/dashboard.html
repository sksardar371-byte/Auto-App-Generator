<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body data-page="dashboard">
  <main class="role-shell">
    <aside class="role-sidebar">
      <div class="role-brand"><h2>LMS Admin</h2><p>Platform control</p></div>
      <nav class="role-nav">
        <a class="active" href="dashboard.html">Dashboard</a>
        <a href="users.html">Users</a>
        <a href="courses.html">Courses</a>
        <a href="categories.html">Categories</a>
        <a href="revenue.html">Revenue</a>
        <a href="reports.html">Reports</a>
        <a href="settings.html">Settings</a>
      </nav>
    </aside>
    <section class="role-main">
      <header class="role-topbar">
        <div><p>Admin Portal</p><h1>Dashboard</h1></div>
        <div class="topbar-actions"><span id="roleUserLabel" class="topbar-user"></span><button id="logoutBtn" class="btn secondary">Logout</button></div>
      </header>
      <section class="cards">
        <article class="card"><p>Total Users</p><h3 id="metricUsers">0</h3></article>
        <article class="card"><p>Total Courses</p><h3 id="metricCourses">0</h3></article>
        <article class="card"><p>Total Revenue</p><h3 id="metricRevenue">$0</h3></article>
        <article class="card"><p>Total Enrollments</p><h3 id="metricEnrollments">0</h3></article>
        <article class="card"><p>Platform Rating</p><h3 id="metricRating">0.0</h3></article>
      </section>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script src="../script.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
